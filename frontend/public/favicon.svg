<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" role="img" aria-label="PunchPay">
  <defs>
    <style type="text/css">
      <![CDATA[
        @import url("https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap");
        .pp {
          font-family: "Syne", system-ui, sans-serif;
          font-weight: 800;
          font-size: 26px;
          letter-spacing: -0.02em;
        }
      ]]>
    </style>
  </defs>
  <!-- Gold rounded square + clock (matches login / dashboard) -->
  <rect x="8" y="8" width="48" height="48" rx="8" fill="#D4A843" />
  <g transform="translate(8, 8) scale(2)">
    <circle
      cx="12"
      cy="12"
      r="10"
      fill="none"
      stroke="#0A0A0A"
      stroke-width="2.5"
    />
    <polyline
      points="12 6 12 12 16 14"
      fill="none"
      stroke="#0A0A0A"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
  <!-- Punch + gold Pay -->
  <text x="68" y="42" class="pp">
    <tspan fill="#0A0A0A">Punch</tspan><tspan fill="#D4A843">Pay</tspan>
  </text>
</svg>
