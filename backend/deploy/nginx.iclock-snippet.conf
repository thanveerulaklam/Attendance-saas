# PunchPay ADMS — stop fingerprint devices syncing from HTTP Date (GMT → 30 min slow IST).
#
# proxy_hide_header Date only hides Node's Date; nginx STILL adds its own Date to clients.
# You need headers-more module + more_clear_headers.

# 1) Install once on Ubuntu VPS:
#    sudo apt install libnginx-mod-http-headers-more-filter
#    sudo nginx -t && sudo systemctl reload nginx
#
# 2) Add inside BOTH location /iclock/ { } blocks in /etc/nginx/sites-available/punchpay:

location /iclock/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    client_max_body_size 10M;
    proxy_hide_header Date;
    more_clear_headers Date;
}

# 3) Verify (must return NOTHING):
#    curl -si 'http://punchpay.in/iclock/getrequest?SN=TEST' | grep -i date
#
# 4) Also verify Node strips Date (optional):
#    curl -si 'http://127.0.0.1:3000/iclock/getrequest?SN=TEST' | grep -i date
