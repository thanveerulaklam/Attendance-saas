# Sample Nginx config for Attendance SaaS API.
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled.
# Replace DOMAIN, SSL paths, and upstream port as needed.

# Upstream (Node/PM2)
upstream attendance_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP -> HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     server_name api.yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL (uncomment and set paths when using certbot/SSL)
    # ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://attendance_api;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    client_max_body_size 50M;
}
