# Production Nginx: serves React frontend + proxies /api to Node backend.
# Copy to /etc/nginx/sites-available/attendance
# Replace yourdomain.com with your domain (or use _ for IP-only)
# ln -sf /etc/nginx/sites-available/attendance /etc/nginx/sites-enabled/

upstream attendance_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/Attendance-saas/frontend/dist;
    index index.html;

    location /api {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://attendance_api;
        proxy_read_timeout 60s;
        client_max_body_size 5M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
